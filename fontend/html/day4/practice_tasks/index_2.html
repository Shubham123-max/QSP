<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Heading 1</h1>
    <p>
      H1 is the largest heading , we can give main title or main heading od the
      page using it
    </p>
    <h2>Heading 2</h2>
    <p>h2 is slightly smaller than h1</p>
    <h3>Heading 3</h3>
    <p>h3 is smaller than h2</p>
    <h4>Heading 4</h4>
    <p>h4 is smaller than h3</p>
    <h5>Heading 5</h5>
    <p>h5 is smaller than h4</p>
    <h6>Heading 6</h6>
    <p>h6 is smaller than h5</p>
  </body>
</html>
